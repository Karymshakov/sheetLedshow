<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 90" width="100%" height="100%">
  <defs>
    <!-- Gradients for modern glossy tech look -->
    <linearGradient id="red-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2a5f" />
      <stop offset="100%" stop-color="#b8002c" />
    </linearGradient>
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff66" />
      <stop offset="100%" stop-color="#009933" />
    </linearGradient>
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#0077b6" />
    </linearGradient>
    
    <!-- Glow filter for tech effect -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Logo Icon -->
  <g transform="translate(10, 10)">
    <!-- Red column -->
    <path d="M 0,18 L 12,14 L 12,56 L 0,60 Z" fill="url(#red-grad)" />
    
    <!-- Green column -->
    <path d="M 18,10 L 30,6 L 30,64 L 18,68 Z" fill="url(#green-grad)" />
    
    <!-- Cyan column / Left side of screen -->
    <path d="M 36,2 L 48,0 L 48,70 L 36,72 Z" fill="url(#cyan-grad)" />
    
    <!-- Screen Frame Perspective -->
    <path d="M 56,2 L 102,12 L 102,60 L 56,70 Z" fill="none" stroke="url(#cyan-grad)" stroke-width="6" stroke-linejoin="round" filter="url(#neon-glow)" />
    
    <!-- Screen Inner Glow / Light Panel -->
    <path d="M 62,6 L 96,14 L 96,57 L 62,65 Z" fill="rgba(0, 240, 255, 0.08)" />
  </g>
  
  <!-- Logo Text -->
  <g transform="translate(130, 20)">
    <!-- Main text -->
    <text x="0" y="32" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-size="34" font-weight="900" fill="#ffffff" letter-spacing="1">
      LED <tspan fill="#00f0ff">SHOW</tspan>
    </text>
    
    <!-- Subtitle -->
    <text x="2" y="50" font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" font-weight="600" fill="#6b7280" letter-spacing="2.5">
      LED ЭКРАНЫ &amp; АРЕНДА
    </text>
  </g>
</svg>
